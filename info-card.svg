te" from="0 5" to="0 0" begin="1.35s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/></g><g opacity="0" transform="translate(0,5)"><circle cx="23" cy="466.0" r="2.5" fill="#3fb950"/><text x="34" y="470.0" fill="#c9d1d9" font-size="12.5">Built a group video calling web app enabling concurrent users with SFU.</text><animate attributeName="opacity" from="0" to="1" begin="1.41s" dur="0.4s" fill="freeze"/><animateTransform attributeName="transform" type="translate" from="0 5" to="0 0" begin="1.41s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/></g><g opacity="0" transform="translate(0,5)"><circle cx="23" cy="486.5" r="2.5" fill="#3fb950"/><text x="34" y="490.5" fill="#c9d1d9" font-size="12.5">Built the Andorid app for Employees using React Native and integrated it with HRMS backend.</text><animate attributeName="opacity" from="0" to="1" begin="1.47s" dur="0.4s" fill="freeze"/><animateTransform attributeName="transform" type="translate" from="0 5" to="0 0" begin="1.47s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/></g><g opacity="0" transform="translate(0,5)"><circle cx="23" cy="507.0" r="2.5" fill="#3fb950"/><text x="34" y="511.0" fill="#c9d1d9" font-size="12.5">Shipped a production grade landing page to a client in a tight deadline  of 1 week.</text><animate attributeName="opacity" from="0" to="1" begin="1.53s" dur="0.4s" fill="freeze"/><animateTransform attributeName="transform" type="translate" from="0 5" to="0 0" begin="1.53s" dur="0.4s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/></g><g opacity="0" transform="translate(0,5)"><circle cx="23" cy="527.5" r="2.5" fill="#3fb950"/><text x="34" y="531.5" fill="#c9d1d9" font-size="12.5">More coming soon...</text><animate attributeName="opacity" from="0" to="1" begin="1.59s" dur="0.4s" fill="freeze"/><animateTransform attributeName="transform" type="translate" from="0 5" to="0 0" begin="1.59s" dur="0.4s" fill="freeze" calcMode="spline"